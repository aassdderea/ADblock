name: Build AdBlock Dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 支持手动触发

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos & Dependencies
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          brew install ldid dpkg xz

      - name: Setup Orion (Lightweight Hook Framework)
        run: |
          git clone --depth 1 https://github.com/theos/orion.git $THEOS/vendor/orion
          echo "ORION=1" >> $GITHUB_ENV

      - name: Build Dylib
        run: |
          export THEOS=~/theos
          make package FINALPACKAGE=1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AdBlock-Dylib-${{ github.sha }}
          path: packages/*.deb
          retention-days: 7
