name: Build AdBlock Dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos with Explicit SDK
        run: |
          # 关键修复：设置 GITHUB_TOKEN 避免 API 限流 + 直接指定 SDK 版本
          export GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)" -- --sdk=iphoneos16.5
          
          # 验证安装
          ls ~/theos/sdks/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Orion
        run: |
          # Orion 已在 install-theos 中作为 submodule 自动拉取，无需重复 clone
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Build Dylib
        run: |
          make package FINALPACKAGE=1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AdBlock-Dylib-${{ github.sha }}
          path: packages/*.deb
          retention-days: 7
